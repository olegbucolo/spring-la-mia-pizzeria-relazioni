<!DOCTYPE html>
<html lang="en">

<head>
    <th:block th:replace="~{fragments/styles :: styles}"></th:block>
    <title>Ingredients create</title>
</head>

<body>
    <th:block th:replace="~{fragments/header :: header}"></th:block>
    <main>
        <form class="mt-3 d-flex" th:action="@{/ingredients}" th:object="${ingredient}" method="POST">
            <div>
                <label for="name">Ingredient name</label>
                <input th:field="*{name}" id="name" type="text">
                <div class="d-inline text-danger"  th:if="@{#fields.hasErrors('name')}" th:errors="*{name}">
                    <!-- <span style="color: red">ERROR WITH NAME, MUST BE BELOW TOT</span> -->
                </div>
            </div>

            <button class="ms-2" type="submit">Add new Ingredient</button>
        </form>
    </main>
</body>

</html>
